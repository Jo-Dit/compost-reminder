# ─────────────────────────────────────────────
#  Compost Reminder – Application Configuration
# ─────────────────────────────────────────────

spring.application.name=compost-reminder
server.port=8080

# ── Database (H2 in-memory, swap for PostgreSQL in prod) ──
spring.datasource.url=jdbc:h2:mem:compostdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Email (Gmail SMTP example – replace with your credentials) ──
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_EMAIL@gmail.com
spring.mail.password=YOUR_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Notification Timing ──
# Morning shift reminder: 7:00 AM  →  cron = "0 0 7 * * *"
# Afternoon shift reminder: 12:00 PM → cron = "0 0 12 * * *"
notification.morning.cron=0 30 7 * * *
notification.afternoon.cron=0 10 13 * * *

# Club info shown in messages
notification.club-name=Green Grounds Composting Club
notification.morning.message=Good morning! Don't forget to PUT OUT the compost bins for your shift today. 🌱 Thanks for helping the planet!
notification.afternoon.message=Heads up! It's almost time to COLLECT the compost bins for your afternoon shift today. 🌿 Thank you!

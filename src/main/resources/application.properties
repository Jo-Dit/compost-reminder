# ─────────────────────────────────────────────
#  Compost Reminder – Application Configuration
# ─────────────────────────────────────────────

spring.application.name=compost-reminder
server.port=${PORT:8080}

# ── Database (PostgreSQL) ──
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# ── Email (Resend API – set RESEND_API_KEY env var) ──
notification.from-email=${RESEND_FROM_EMAIL}

# ── Notification Timing ──
# Morning shift reminder: 7:30 AM New York time
# Afternoon shift reminder: 1:10 PM New York time
notification.morning.cron=0 30 7 * * *
notification.afternoon.cron=0 10 13 * * *

# Club info shown in messages
notification.club-name=Green Grounds Composting Club
notification.morning.message=Good morning! Don't forget to put out the compost bins for your shift today.\nThanks!
notification.afternoon.message=Good afternoon! Don't forget to take out the compost bins for your shift today.\nThanks!

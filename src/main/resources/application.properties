# ─────────────────────────────────────────────
#  Compost Reminder – Application Configuration
# ─────────────────────────────────────────────

spring.application.name=compost-reminder
server.port=${PORT:8080}

# ── Database (H2 in-memory) ──
spring.datasource.url=jdbc:h2:mem:compostdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Email (Resend API – set RESEND_API_KEY env var) ──
notification.from-email=onboarding@resend.dev

# ── Notification Timing ──
# Morning shift reminder: 7:00 AM Eastern = 11:00 AM UTC
# Afternoon shift reminder: 12:00 PM Eastern = 4:00 PM UTC
notification.morning.cron=0 0 11 * * *
notification.afternoon.cron=0 0 16 * * *

# Club info shown in messages
notification.club-name=Green Grounds Composting Club
notification.morning.message=Good morning! Don't forget to PUT OUT the compost bins for your shift today. 🌱 Thanks for helping the planet!
notification.afternoon.message=Heads up! It's almost time to COLLECT the compost bins for your afternoon shift today. 🌿 Thank you!

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin – Test Notifications</title>
    <style>
        body { font-family: sans-serif; max-width: 480px; margin: 60px auto; padding: 0 1rem; color: #1e2d14; background: #f5f0e8; }
        h1 { font-size: 1.4rem; margin-bottom: 0.25rem; }
        p.sub { color: #6b7c5e; margin-bottom: 2rem; font-size: 0.9rem; }
        .buttons { display: flex; gap: 1rem; }
        button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-morning  { background: #f4c542; color: #3b2a00; }
        .btn-afternoon { background: #7fb069; color: white; }
        button:hover { opacity: 0.85; }
        .message {
            margin-top: 1.5rem;
            padding: 0.75rem 1rem;
            background: white;
            border-left: 4px solid #7fb069;
            border-radius: 4px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <h1>Test Notifications</h1>
    <p class="sub">Immediately sends today's reminders to all matching signups.</p>

    <div class="buttons">
        <form method="post" th:action="@{/admin/test-notify}">
            <input type="hidden" name="shift" value="morning"/>
            <button type="submit" class="btn-morning">Send Morning</button>
        </form>
        <form method="post" th:action="@{/admin/test-notify}">
            <input type="hidden" name="shift" value="afternoon"/>
            <button type="submit" class="btn-afternoon">Send Afternoon</button>
        </form>
    </div>

    <div class="message" th:if="${message}" th:text="${message}"></div>
</body>
</html>
